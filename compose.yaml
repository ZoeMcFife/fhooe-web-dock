name: fhooe-web-dock

services:
  db:
    build:
      dockerfile: Dockerfile-mariadb
    container_name: mariadb
    volumes:
      - dbdata:/var/lib/mysql
    # Values for environment variables are stored in .env file
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: ${MYSQL_RANDOM_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST}
      LANG: ${LANG}
    ports:
      - "127.0.0.1:${DB_PORT_EXTERNAL:-6033}:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always
    hostname: mariadb
  php-apache:
    build:
      dockerfile: Dockerfile-php
    container_name: webapp
    depends_on:
      - db
    volumes:
      - ./webapp:/var/www/html
      - ../Zoes-Hagenberg-2-Electric-Boogaloo:/app/public/projects
      - ../ue01-dxkfgbskdgbfskdgbrwsifg:/app/public/ue01-dx
      - ../ue02-dxkfgbskdgbfskdgbrwsifg:/app/public/ue02-dx
      - ../ue03-dxkfgbskdgbfskdgbrwsifg:/app/public/ue03-dx
      - ../ue04-dxkfgbskdgbfskdgbrwsifg:/app/public/ue04-dx
      - ../ue05-dxkfgbskdgbfskdgbrwsifg:/app/public/ue05-dx
      - ../ue06-dxkfgbskdgbfskdgbrwsifg:/app/public/ue06-dx

    # Values for environment variables are stored in .env file
    environment:
      DB_HOST: db
      DB_HOST_EXTERNAL: ${DB_HOST_EXTERNAL:-localhost}
      DB_PORT: 3306
      DB_PORT_EXTERNAL: ${DB_PORT_EXTERNAL:-6033}
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      WEB_PORT_HTTP: ${WEB_PORT_HTTP:-8080}
      WEB_PORT_HTTPS: ${WEB_PORT_HTTPS:-7443}
      PMA_PORT_HTTP: ${PMA_PORT_HTTP:-8082}
      PMA_PORT_HTTPS: ${PMA_PORT_HTTPS:-8443}
    ports:
      - "127.0.0.1:${WEB_PORT_HTTP:-8080}:80"
      - "127.0.0.1:${WEB_PORT_HTTPS:-7443}:443"
    restart: always
    hostname: webapp
  # FrankenPHP (experimental): Modern PHP app server based on Caddy
  # Runs in parallel to php-apache; use http://localhost:8081 or https://localhost:7444
  frankenphp:
    profiles:
      - experimental
    build:
      dockerfile: Dockerfile-frankenphp
    container_name: webapp-frankenphp
    depends_on:
      - db
    volumes:
      - ./webapp:/app/public
      - ../Zoes-Hagenberg-2-Electric-Boogaloo:/app/public/projects
      - ../ue01-dxkfgbskdgbfskdgbrwsifg:/app/public/ue01-dx
      - ../ue02-dxkfgbskdgbfskdgbrwsifg:/app/public/ue02-dx
      - ../ue03-dxkfgbskdgbfskdgbrwsifg:/app/public/ue03-dx
      - ../ue04-dxkfgbskdgbfskdgbrwsifg:/app/public/ue04-dx
      - ../ue05-dxkfgbskdgbfskdgbrwsifg:/app/public/ue05-dx
      - ../ue06-dxkfgbskdgbfskdgbrwsifg:/app/public/ue06-dx
    environment:
      DB_HOST: db
      DB_HOST_EXTERNAL: ${DB_HOST_EXTERNAL:-localhost}
      DB_PORT: 3306
      DB_PORT_EXTERNAL: ${DB_PORT_EXTERNAL:-6033}
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      SERVER_NAME: "http://:80, https://localhost"
      FRANKENPHP_WEB_PORT_HTTP: ${FRANKENPHP_WEB_PORT_HTTP:-8081}
      FRANKENPHP_WEB_PORT_HTTPS: ${FRANKENPHP_WEB_PORT_HTTPS:-7444}
    ports:
      - "127.0.0.1:${FRANKENPHP_WEB_PORT_HTTP:-8081}:80"
      - "127.0.0.1:${FRANKENPHP_WEB_PORT_HTTPS:-7444}:443"
      - "127.0.0.1:${FRANKENPHP_WEB_PORT_HTTPS:-7444}:443/udp"
    restart: always
    hostname: webapp-frankenphp
    tty: true
  # adminer better
  adminer:
    image: adminer
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8082:8080"
networks:
  default:
    name: webnet

volumes:
  dbdata:
